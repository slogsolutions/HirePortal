version: "3.9"

services:
  server:
    build: ./server
    container_name: hireportal-server
    restart: always
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
    env_file:
      - ./server/.env

  client:
    build: ./client
    container_name: hireportal-client
    restart: always
    ports:
      - "3015:80"
    env_file:
      - ./client/.env 
    depends_on:
      - server
